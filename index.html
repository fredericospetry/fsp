<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSP</title>

    <!-- Google Fonts - Cactus Classical Serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /* Estilos gerais */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        .page-wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            perspective: 1000px;
        }

        /* Canvas do Matrix */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-color: #000;
        }

        /* Quadro semi-transparente */
        .quadro {
            background: rgba(0, 0, 0, 0.5); /* Fundo preto com 60% de opacidade */
            padding: 30px;
            border-radius: 20px; /* Bordas arredondadas */
            box-shadow: 0px 10px 30px rgba(241, 238, 238, 0.5); /* Sombra para destaque */
        }

        /* Container geral */
        .content-container {
            text-align: center;
        }

        /* Título com Sombra 3D Estática */
        .title-container h1 {
            font-family: "VT323", monospace;
            font-weight: 600;
            font-size: 42px;
            color: #fff9f9; /* Texto branco para melhor contraste */
            text-shadow:
        2px 2px 5px #000,
        4px 4px 5px #000,
        6px 6px 5px #000,
        8px 8px 5px #000,
        10px 10px 15px rgba(0, 0, 0, 0.5);
            padding: 20px;
            margin-bottom: 30px;
        }

        /* Container das imagens */
        .image-container {
            display: flex;
            gap: 50px;
            justify-content: center;
        }

        /* Estilo do link (contêiner) */
        .image-link {
            position: relative;
            display: inline-block;
            width: 150px;
            height: 150px;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            transform-style: preserve-3d;
        }

        /* Estilo da imagem */
        .image-link img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
        }

        /* Efeito de rotação 3D e sombra ao passar o mouse */
        .image-link:hover {
            transform: rotateY(20deg) rotateX(10deg) scale(1.1);
            box-shadow: 0px 20px 40px rgba(255, 255, 255, 0.3); /* Sombra branca para contraste */
        }

        /* Adiciona uma sombra atrás da imagem */
        .image-link::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150px;
            height: 150px;
            background: rgba(68, 68, 68, 0.938);
            border-radius: 15px;
            filter: blur(20px);
            transform: translate(-50%, -50%) scale(1);
            transition: opacity 0.5s ease, transform 0.5s ease;
            opacity: 0;
            z-index: -1;
        }

        /* Ativa a sombra ao passar o mouse */
        .image-link:hover::after {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* Estilos para o copyright */
        .copyright {
            margin-top: 50px;
            text-align: center;
            color: rgb(255, 255, 255); /* Texto branco para melhor contraste */
            font-family: "VT323", monospace;
            text-shadow:
                2px 2px 0 #000,
                3px 3px 0 #000,
                4px 4px 0 #000,
                10px 10px 10px rgba(0, 0, 0, 0.5);
        }

        .copyright p {
            margin: 5px 0;
            font-weight: 400;
        }

        .copyright a {
            color: #cacaca; /* Azul claro para links */
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .copyright a:hover {
            color: #00b60f; /* Verde ao passar o mouse */
        }
    </style>
</head>

<body>
        <!-- Canvas para animação Matrix -->
        <canvas id="matrix-canvas"></canvas>

        <div class="page-wrapper">
            <div class="content-container">

        <!-- Quadro semi-transparente -->
        <div class="quadro">
            <!-- Título acima das imagens -->
            <div class="title-container">
                <h1>Publicações</h1>
            </div>

            <!-- Container das imagens -->
            <div class="image-container">
                <!-- Link 1 -->
                <a href="https://cactosrs.netlify.app/" target="_blank" class="image-link">
                    <img src="img1.png" alt="Cactos RS">
                </a>

                <!-- Link 2 -->
                <a href="https://guia-de-cultivo-de-cactos.netlify.app/" target="_blank" class="image-link">
                    <img src="img2.png" alt="Guia de Cultivo de Cactos">
                </a>

                <!-- Link 3 -->
                <a href="https://guiaflorapromata.netlify.app/" target="_blank" class="image-link">
                    <img src="img3.png" alt="Guia de Cultivo de Cactos">
                </a>

                <!-- Link 4 -->
                <a href="https://pdfreed.netlify.app/" target="_blank" class="image-link">
                    <img src="img4.png" alt="Guia de Cultivo de Cactos">
                </a>
            </div>

            <!-- Copyright -->
            <div class="copyright">
                <p>© 2026 Desenvolvido por <a href="https://www.instagram.com/petryfrederico/" target="_blank">Frederico
                        Schäffer Petry</a></p>
            </div>
        </div>
    </div>
    </div> <!-- Fecha page-wrapper -->
    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        // Ajustar tamanho do canvas
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Caracteres para o efeito Matrix
        const chars = 'frederico schaffer petry';
        const fontSize = 11.5;
        const columns = canvas.width / fontSize;

        // Array de gotas (uma por coluna)
        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = Math.floor(Math.random() * canvas.height / fontSize);
        }

        // Função de desenho
        function draw() {
            // Fundo semi-transparente para efeito de fade
            ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Texto verde estilo Matrix
            ctx.fillStyle = '#FF0000'; // Verde Matrix
            ctx.font = fontSize + 'px monospace';

            // Loop através das gotas
            for (let i = 0; i < drops.length; i++) {
                // Caractere aleatório
                const text = chars[Math.floor(Math.random() * chars.length)];
                
                // Desenhar caractere
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // Resetar gota ao final da tela
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }

                // Incrementar Y da gota
                drops[i]++;
            }
        }

        // Executar animação
        setInterval(draw, 33);

        // Redimensionar canvas ao mudar tamanho da janela
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>

</html>
