<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>FSP</title>

    <!-- Google Fonts - Orbitron + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Estilos gerais */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow-x: auto;
            overflow-y: auto;
        }

        .page-wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            perspective: 1000px;
            padding: 20px;
            box-sizing: border-box;
            gap: 30px;
        }

        /* Canvas do Matrix */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-color: #000;
        }

        /* Quadro semi-transparente */
        .quadro {
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(241, 238, 238, 0.5);
            width: 100%;
            max-width: 900px;
        }

        /* Container geral */
        .content-container {
            text-align: left;
            width: 100%;
        }

        /* Título com Sombra 3D Estática */
        .title-container h1 {
            font-family: "Orbitron", sans-serif;
            font-weight: 900;
            font-size: 28px;
            color: #fff9f9;
            text-shadow:
            2px 2px 5px #000,
            4px 4px 5px #000,
            6px 6px 5px #000,
            8px 8px 5px #000,
            10px 10px 15px rgba(0, 0, 0, 0.5);
            padding: 20px;
            margin-bottom: 30px;
        }

        /* Container das imagens */
        .image-container {
            display: flex;
            gap: 50px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Estilo do link (contêiner) */
        .image-link {
            position: relative;
            display: inline-block;
            width: 150px;
            height: 150px;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            transform-style: preserve-3d;
        }

        /* Estilo da imagem */
        .image-link img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
        }

        /* Efeito de rotação 3D e sombra ao passar o mouse */
        .image-link:hover {
            transform: rotateY(20deg) rotateX(10deg) scale(1.1);
            box-shadow: 0px 20px 40px rgba(255, 255, 255, 0.3);
        }

        /* Adiciona uma sombra atrás da imagem */
        .image-link::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150px;
            height: 150px;
            background: rgba(68, 68, 68, 0.938);
            border-radius: 15px;
            filter: blur(20px);
            transform: translate(-50%, -50%) scale(1);
            transition: opacity 0.5s ease, transform 0.5s ease;
            opacity: 0;
            z-index: -1;
        }

        /* Ativa a sombra ao passar o mouse */
        .image-link:hover::after {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* Estilos para o copyright */
        .copyright {
            margin-top: 50px;
            text-align: center;
            color: rgb(255, 255, 255);
            font-family: "Orbitron", sans-serif;
            text-shadow:
                2px 2px 0 #000,
                3px 3px 0 #000,
                4px 4px 0 #000,
                10px 10px 10px rgba(0, 0, 0, 0.5);
        }

        .copyright p {
            margin: 5px 0;
            font-weight: 100;
        }

        .copyright a {
            color: #cacaca;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .copyright a:hover {
            color: #da0000;
        }

        /* Responsividade para mobile */
        @media (max-width: 768px) {
            .image-container {
                gap: 30px;
            }
            
            .image-link {
                width: 120px;
                height: 120px;
            }
            
            .title-container h1 {
                font-size: 24px;
            }
            
            .quadro {
                padding: 20px;
                margin: 10px;
            }

            .page-wrapper {
                gap: 20px;
            }
        }

    </style>
</head>

<body>
    <!-- Canvas para animação Matrix -->
    <canvas id="matrix-canvas"></canvas>

    <div class="page-wrapper">
        <!-- QUADRO 1: Publicações -->
        <div class="quadro">
            <div class="title-container">
                <h1>Publicações</h1>
            </div>
            <div class="image-container">
                <a href="https://cactosrs.netlify.app/" target="_blank" class="image-link">
                    <img src="img1.png" alt="Cactos RS">
                </a>
                <a href="https://guia-de-cultivo-de-cactos.netlify.app/" target="_blank" class="image-link">
                    <img src="img2.png" alt="Guia de Cultivo de Cactos">
                </a>
                <a href="https://guiaflorapromata.netlify.app/" target="_blank" class="image-link">
                    <img src="img3.png" alt="Guia Flora Pro Mata">
                </a>
                <a href="https://pdfreed.netlify.app/" target="_blank" class="image-link">
                    <img src="img4.png" alt="PDF Reed">
                </a>
            </div>
        </div>

        <!-- QUADRO 2: Projetos -->
        <div class="quadro">
            <div class="title-container">
                <h1>Projetos</h1>
            </div>
            <div class="image-container">
                <a href="#" target="_blank" class="image-link">
                    <img src="img1.png" alt="Projeto 1">
                </a>
                <a href="#" target="_blank" class="image-link">
                    <img src="img2.png" alt="Projeto 2">
                </a>
                <a href="#" target="_blank" class="image-link">
                    <img src="img3.png" alt="Projeto 3">
                </a>
                <a href="#" target="_blank" class="image-link">
                    <img src="img4.png" alt="Projeto 4">
                </a>
            </div>
        </div>

        <!-- QUADRO 3: Portfólio -->
        <div class="quadro">
            <div class="title-container">
                <h1>Portfólio</h1>
            </div>
            <div class="image-container">
                <a href="#" target="_blank" class="image-link">
                    <img src="img1.png" alt="Portfolio 1">
                </a>
                <a href="#" target="_blank" class="image-link">
                    <img src="img2.png" alt="Portfolio 2">
                </a>
                <a href="#" target="_blank" class="image-link">
                    <img src="img3.png" alt="Portfolio 3">
                </a>
                <a href="#" target="_blank" class="image-link">
                    <img src="img4.png" alt="Portfolio 4">
                </a>
            </div>
        </div>

        <!-- QUADRO 4: Contato -->
        <div class="quadro">
            <div class="title-container">
                <h1>Contato</h1>
            </div>
            <div class="image-container">
                <a href="#" target="_blank" class="image-link">
                    <img src="img1.png" alt="Contato 1">
                </a>
                <a href="#" target="_blank" class="image-link">
                    <img src="img2.png" alt="Contato 2">
                </a>
                <a href="#" target="_blank" class="image-link">
                    <img src="img3.png" alt="Contato 3">
                </a>
                <a href="#" target="_blank" class="image-link">
                    <img src="img4.png" alt="Contato 4">
                </a>
            </div>
        </div>

        <!-- Copyright -->
        <div class="copyright">
            <p>© 2026 Desenvolvido por <a href="https://www.instagram.com/petryfrederico/" target="_blank">FSP</a>.</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = 'frederico schaffer petry';
        const fontSize = 11.5;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = Math.floor(Math.random() * canvas.height / fontSize);
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#FF0000';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>

</html>
